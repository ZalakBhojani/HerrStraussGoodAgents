<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herr Strauss Collections</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Herr Strauss Collections</h2>
      <div class="status" id="status">Connecting...</div>
    </div>

    <!-- Voice call ready banner -->
    <div class="voice-banner" id="voiceBanner">
      <div class="voice-info">
        <strong>Voice Call Available</strong>
        A specialist is ready to discuss resolution options with you.
      </div>
      <button class="btn-call" id="callBtn">Start Call</button>
    </div>

    <!-- Active call indicator -->
    <div class="call-status" id="callStatus">
      <div class="dot"></div>
      <span id="callStatusText">Call in progress…</span>
    </div>

    <div class="chat-messages" id="messages"></div>

    <!-- Post-call summary card -->
    <div class="call-summary" id="callSummary">
      <h4>Call Summary</h4>
      <div class="summary-row"><span class="label">Status:</span><span id="summaryStatus">—</span></div>
      <div class="summary-row"><span class="label">Resolution:</span><span id="summaryResolution">—</span></div>
      <div class="summary-row"><span class="label">Settlement:</span><span id="summarySettlement">—</span></div>
    </div>

    <div class="chat-input">
      <input type="text" id="input" placeholder="Type a message..." disabled autocomplete="off" />
      <button id="send" disabled>Send</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
