<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herr Strauss Collections</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 480px;
      height: 640px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: #1e3a5f;
      color: #fff;
    }
    .chat-header h2 { font-size: 15px; font-weight: 600; }
    .chat-header .status { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .message.agent {
      background: #f3f4f6;
      color: #111827;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }
    .message.user {
      background: #1e3a5f;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e5e7eb;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input input:focus { border-color: #1e3a5f; }
    .chat-input input:disabled { background: #f9fafb; }
    .chat-input button {
      padding: 10px 18px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chat-input button:hover:not(:disabled) { background: #16304f; }
    .chat-input button:disabled { background: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Herr Strauss Collections</h2>
      <div class="status" id="status">Connecting...</div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="Type a message..." disabled autocomplete="off" />
      <button id="send" disabled>Send</button>
    </div>
  </div>

  <script>
    const borrowerId = (crypto.randomUUID ?? (() => Math.random().toString(36).slice(2) + Date.now().toString(36)))();
    const ws = new WebSocket(`ws://${location.host}/ws/${borrowerId}`);
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    function appendMessage(text, role) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    ws.onopen = () => {
      statusEl.textContent = 'Connected • Session: ' + borrowerId.slice(0, 8);
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      statusEl.textContent = 'Disconnected';
      inputEl.disabled = true;
      sendBtn.disabled = true;
    };

    ws.onerror = () => {
      statusEl.textContent = 'Connection error';
    };

    ws.onmessage = (e) => {
      appendMessage(e.data, 'agent');
    };

    function send() {
      const text = inputEl.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      appendMessage(text, 'user');
      ws.send(text);
      inputEl.value = '';
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
